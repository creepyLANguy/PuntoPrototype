<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #05070d;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        html,
        body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            padding: 1.25rem;
            /* safe edges */

            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 92, 255, 0.08), transparent 40%),
                var(--bg-dark);
        }

        /* Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            transition: transform 0.2s ease-out;
        }

        .orb.one {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
            animation: shimmer 10s linear infinite alternate-reverse;
        }

        .orb.two {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
            animation: shimmer2 10s linear infinite alternate-reverse;
        }

        @keyframes shimmer {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-150px, -150px);
            }
        }

        @keyframes shimmer2 {
            from {
                transform: translate(100px, 100px);
            }

            to {
                transform: translate(200px, 200px);
            }
        }

        /* Glass card */
        .container {
            text-align: center;
            z-index: 3;
            max-width: 520px;
            max-height: calc(100dvh - 2.5rem);
            width: 100%;
            padding: clamp(1.5rem, 4vw, 3rem);

            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;

            box-shadow:
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 80px rgba(124, 92, 255, 0.2);

            transition: all 0.3s ease;

            animation: floatLogo 6s ease-in-out infinite;

        }

        .logo-img {
            width: clamp(100px, 30vw, 160px);
            margin-bottom: 1.5rem;
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .logo-text {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -1px;

            background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.85);
            text-wrap: balance;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 900;
            letter-spacing: 1.5px;
            border-radius: 100px;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 0, 0.8);
            margin-top: 5%;
        }

        /* Landscape optimization */
        @media (orientation: landscape) and (max-height: 700px) {
            body {
                padding: 2rem;
            }

            @media (orientation: landscape) {
                .container {
                    flex-direction: column;
                    /* keep stacking */
                    text-align: center;
                    max-width: 520px;
                    max-height: 90dvh;
                    /* leave some breathing room */
                    width: 100%;
                    padding: 1rem 1.5rem;
                    /* reduce padding slightly */
                }
            }

            @media (orientation: landscape) and (max-height: 500px) {
                .logo-img {
                    width: clamp(80px, 25vw, 120px);
                }

                .logo-text {
                    font-size: clamp(1.5rem, 5vw, 2.5rem);
                }

                h1 {
                    font-size: clamp(0.9rem, 3vw, 1.2rem);
                }

                .badge {
                    font-size: clamp(0.6rem, 2vw, 0.8rem);
                    margin-top: 0%;
                }
            }
        }
    </style>
</head>

<body>
    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>

    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img">
        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge">COMING SOON</div>
    </div>

    <script>
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        document.addEventListener('mousemove', (e) =>
        {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            orb1.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
            orb2.style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>
</body>

</html>
