<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>
    <meta name="description"
        content="Padel Push is currently under construction. The ultimate Padel scoring system is coming soon.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ffff00;
            --secondary: #00ffff;
            --bg-dark: #000000;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
            position: relative;

            /* Subtle animated gradient */
            background: radial-gradient(circle at 20% 20%, rgba(0, 255, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 0, 0.08), transparent 40%),
                var(--bg-dark);
        }

        @keyframes float {
            from {
                transform: translateY(0) translateX(0);
            }

            to {
                transform: translateY(-40px) translateX(30px);
            }
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 1;
            max-width: 600px;
        }

        .logo-img {
            width: 180px;
            margin-bottom: 2rem;
            animation: logoanimation 6s ease-in-out infinite;
        }

        @keyframes logoanimation {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            animation: fadeInUp 1s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.9);
            animation: fadeInUp 1s ease-out;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img">
        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <br />
        <div class="badge">Currently In Development</div>
    </div>

</body>

</html>
