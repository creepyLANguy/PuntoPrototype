<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #05070d;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
            position: relative;

            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 92, 255, 0.08), transparent 40%),
                var(--bg-dark);
        }

        /* Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            transition: transform 0.2s ease-out;
        }

        .orb.one {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
        }

        .orb.two {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
        }

        /* Particles */
        .particles {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.15), transparent),
                radial-gradient(2px 2px at 70% 60%, rgba(255, 255, 255, 0.1), transparent),
                radial-gradient(1.5px 1.5px at 40% 80%, rgba(255, 255, 255, 0.1), transparent);
            background-repeat: repeat;
            animation: shimmer 60s linear infinite;
            opacity: 0.4;
        }

        @keyframes shimmer {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-200px, -200px);
            }
        }

        /* Glass card */
        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            z-index: 1;
            max-width: 600px;

            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;

            transition: all 0.3s ease;

            box-shadow:
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 80px rgba(124, 92, 255, 0.25);
        }

        .logo-img {
            width: 160px;
            margin-bottom: 2rem;
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        /* Animated gradient text */
        .logo-text {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -1px;

            background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .badge {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;

            color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Noise / grain overlay */
        .noise {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;

            opacity: 0.035;
            /* VERY subtle */

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

            mix-blend-mode: overlay;
        }
    </style>
</head>

<body>

    <div class="particles"></div>
    <div class="noise"></div>

    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>

    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img">
        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge">Currently In Development</div>
    </div>

    <script>
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        document.addEventListener('mousemove', (e) =>
        {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            orb1.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
            orb2.style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>

</body>

</html>
