<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>
    <link rel="icon" type="image/svg+xml" href="app/media/img/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #05070d;
            --text: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --heading-copy: rgba(255, 255, 255, 0.85);
            --badge-ring: rgba(255, 255, 0, 0.8);
            --card-radius: 20px;
            --card-padding: clamp(1.5rem, 4vw, 3rem);
            --logo-size: 160px;
            --logo-gap: 1.5rem;
            --brand-gap: 1rem;
            --headline-gap: 1.5rem;
            --headline-width: 18ch;
            --headline-leading: 1.15;
            --container-scale: 1;
            --float-distance: 12px;
            --viewport-padding: 1.25rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            font-size-adjust: 0.52;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            min-height: 100dvh;
            padding:
                max(var(--viewport-padding), env(safe-area-inset-top))
                max(var(--viewport-padding), env(safe-area-inset-right))
                max(var(--viewport-padding), env(safe-area-inset-bottom))
                max(var(--viewport-padding), env(safe-area-inset-left));

            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 92, 255, 0.08), transparent 40%),
                var(--bg-dark);

            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
        }

        .orb.one {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
        }

        .orb.two {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 3;
            max-width: 520px;
            width: 100%;
            padding: var(--card-padding);

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: var(--card-radius);

            box-shadow:
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 80px rgba(124, 92, 255, 0.2);

            transform: translateZ(0) translateY(10px) scale(calc(var(--container-scale) * 0.98));
            transform-origin: center center;
            transition: transform 0.6s ease;
            will-change: transform;
            overflow: hidden;
        }

        .logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            margin-bottom: var(--logo-gap);
        }

        .logo-text {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: var(--brand-gap);
            text-transform: uppercase;
            letter-spacing: -0.02em;

            background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
            background-size: 400% 400%;

            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            font-weight: 400;
            margin-bottom: var(--headline-gap);
            color: var(--heading-copy);
            max-width: var(--headline-width);
            line-height: var(--headline-leading);
            text-wrap: balance;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 900;
            letter-spacing: 1.5px;
            border-radius: 100px;
            color: var(--text);
            border: 2px solid var(--badge-ring);
        }

        body.loaded {
            opacity: 1;
        }

        body.loaded .container {
            animation: floatLogo 6s ease-in-out infinite;
            transform: translateY(0) scale(var(--container-scale));
        }

        body.loaded .logo-text {
            animation: gradientShift 8s ease infinite;
        }

        body.loaded .orb.one {
            animation: shimmer 10s linear infinite alternate-reverse;
        }

        body.loaded .orb.two {
            animation: shimmer2 10s linear infinite alternate-reverse;
        }

        @keyframes floatLogo {
            0%,
            100% {
                transform: translateY(0) scale(var(--container-scale));
            }

            50% {
                transform: translateY(calc(-1 * var(--float-distance))) scale(var(--container-scale));
            }
        }

        @keyframes shimmer {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-150px, -150px);
            }
        }

        @keyframes shimmer2 {
            from {
                transform: translate(100px, 100px);
            }

            to {
                transform: translate(200px, 200px);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            :root {
                --viewport-padding: 0.85rem;
                --card-padding: clamp(0.9rem, 2.6vw, 1.35rem);
                --logo-size: clamp(72px, 13vw, 108px);
                --logo-gap: 0.65rem;
                --brand-gap: 0.45rem;
                --headline-gap: 0.7rem;
                --headline-width: 24ch;
                --headline-leading: 1.05;
                --float-distance: 6px;
            }

            .container {
                max-width: min(100%, 34rem);
            }

            .logo-text {
                font-size: clamp(1.6rem, 4vw, 2.4rem);
            }

            h1 {
                font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            }

            .badge {
                padding: 0.45rem 1rem;
                font-size: clamp(0.68rem, 2vw, 0.82rem);
            }
            
            .container {
                position: relative;
                overflow: hidden;
                border-radius: var(--card-radius);
                transform: translateZ(0);
                will-change: transform;
            }
            
            .container::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;

                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);

                background: var(--glass-bg);
                border: 1px solid var(--glass-border);

                z-index: -1;
            }
        }
    </style>
</head>

<body>
    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>

    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img" width="160" height="160">

        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge">COMING SOON</div>
    </div>

    <script>
        const body = document.body;
        const container = document.querySelector('.container');
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');
        const mobileLandscapeQuery = window.matchMedia('(orientation: landscape) and (max-height: 500px)');

        function getSpacingValue(styles, propertyName) {
            return parseFloat(styles.getPropertyValue(propertyName)) || 0;
        }

        function updateLandscapeScale() {
            container.style.setProperty('--container-scale', '1');

            if (!mobileLandscapeQuery.matches) {
                return;
            }

            const bodyStyles = window.getComputedStyle(document.body);
            const rootStyles = window.getComputedStyle(document.documentElement);
            const availableWidth = window.innerWidth
                - getSpacingValue(bodyStyles, 'padding-left')
                - getSpacingValue(bodyStyles, 'padding-right');
            const availableHeight = window.innerHeight
                - getSpacingValue(bodyStyles, 'padding-top')
                - getSpacingValue(bodyStyles, 'padding-bottom')
                - getSpacingValue(rootStyles, '--float-distance');

            const rect = container.getBoundingClientRect();
            const scale = Math.min(1, availableWidth / rect.width, availableHeight / rect.height);

            container.style.setProperty('--container-scale', scale.toFixed(4));
        }

        function startAnimations() {
            body.classList.add('loaded');
            updateLandscapeScale();
        }

        window.addEventListener('load', () => {
            requestAnimationFrame(() => {
                requestAnimationFrame(startAnimations);
            });
        });
        
        window.addEventListener('resize', updateLandscapeScale);
        window.addEventListener('orientationchange', updateLandscapeScale);
        mobileLandscapeQuery.addEventListener('change', updateLandscapeScale);

        if (document.fonts?.ready) {
            document.fonts.ready.then(updateLandscapeScale);
        }

        updateLandscapeScale();
    </script>
</body>

</html>
