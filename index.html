<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction | Padel Push</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00d4ff;
    --secondary: #7c5cff;
    --bg-dark: #05070d;
    --text: #ffffff;

    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);

    --radius: 20px;
}

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', system-ui, sans-serif;
}

html, body {
    height: 100%;
    overflow: hidden;
}

/* Layout */
body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,212,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(124,92,255,0.08), transparent 40%),
        var(--bg-dark);
    color: var(--text);

    opacity: 0;
    transition: opacity 0.3s ease;
}

/* Orbs */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0; /* critical fix */
}

.orb.one {
    width: 300px;
    height: 300px;
    background: var(--primary);
    top: -20%;
    left: -20%;
}

.orb.two {
    width: 500px;
    height: 500px;
    background: var(--secondary);
    bottom: -20%;
    right: -20%;
}

/* Card */
.container {
    position: relative;
    z-index: 2;

    max-width: 520px;
    width: 100%;
    padding: 2rem;

    border-radius: var(--radius);
    overflow: hidden;

    transform: translateZ(0);
    will-change: transform;

    text-align: center;
}

/* Glass layer (fixes mobile glitch) */
.container::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    background: var(--glass-bg);
    border: 1px solid var(--glass-border);

    z-index: -1;
}

/* Content */
.logo-img {
    width: 140px;
    margin-bottom: 1rem;
}

.logo-text {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    margin-bottom: 1rem;

    background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
    background-size: 400% 400%;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h1 {
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: rgba(255,255,255,0.85);
    margin-bottom: 1.5rem;
}

.badge {
    display: inline-block;
    padding: 0.5rem 1.2rem;
    font-weight: 900;
    border-radius: 999px;
    border: 2px solid rgba(255,255,0,0.8);
}

/* Animations */
body.loaded {
    opacity: 1;
}

body.loaded .orb {
    opacity: 0.2;
}

body.loaded .orb.one {
    animation: move1 10s linear infinite alternate;
}

body.loaded .orb.two {
    animation: move2 10s linear infinite alternate;
}

body.loaded .logo-text {
    animation: gradient 8s ease infinite;
}

body.loaded .container {
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

@keyframes move1 {
    to { transform: translate(-150px, -150px); }
}

@keyframes move2 {
    to { transform: translate(150px, 150px); }
}

@keyframes gradient {
    50% { background-position: 100% 50%; }
}
</style>
</head>

<body>

<div class="orb one"></div>
<div class="orb two"></div>

<div class="container">
    <img src="app/media/img/logo.svg" class="logo-img">
    <div class="logo-text">Padel Push</div>
    <h1>The Ultimate Padel Scoring System</h1>
    <div class="badge">COMING SOON</div>
</div>

<script>
window.addEventListener('load', () => {
    requestAnimationFrame(() => {
        document.body.classList.add('loaded');
    });
});
</script>

</body>
</html>
