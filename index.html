<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>
    <link rel="icon" type="image/svg+xml" href="app/media/img/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">

    <style>
        /* ===== ROOT ===== */
        :root {
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #05070d;
            --text: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --heading-copy: rgba(255, 255, 255, 0.85);
            --badge-ring: rgba(255, 255, 0, 0.8);
            --card-radius: 20px;
            --card-padding: clamp(1.5rem, 4vw, 3rem);
            --logo-size: 160px;
            --logo-gap: 1.5rem;
            --brand-gap: 1rem;
            --headline-gap: 1.5rem;
            --headline-width: 18ch;
            --headline-leading: 1.15;
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            font-size-adjust: 0.52;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
        }

        /* ===== BODY ===== */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            min-height: 100dvh;
            padding: 1.25rem;

            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 92, 255, 0.08), transparent 40%),
                var(--bg-dark);

            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* ===== ORBS ===== */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
        }

        .orb.one {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
        }

        .orb.two {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
        }

        /* ===== CONTAINER ===== */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 3;
            max-width: 520px;
            width: 100%;
            padding: var(--card-padding);

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: var(--card-radius);

            box-shadow:
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 80px rgba(124, 92, 255, 0.2);

            transform: translateY(10px) scale(0.98);
            transition: transform 0.6s ease;
        }

        /* ===== LOGO ===== */
        .logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            margin-bottom: var(--logo-gap);
        }

        /* ===== TEXT ===== */
        .logo-text {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: var(--brand-gap);
            text-transform: uppercase;
            letter-spacing: -0.02em;

            background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
            background-size: 400% 400%;

            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            font-weight: 400;
            margin-bottom: var(--headline-gap);
            color: var(--heading-copy);
            max-width: var(--headline-width);
            line-height: var(--headline-leading);
            text-wrap: balance;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 900;
            letter-spacing: 1.5px;
            border-radius: 100px;
            color: var(--text);
            border: 2px solid var(--badge-ring);
        }

        /* ===== ANIMATIONS (DELAYED START) ===== */
        body.loaded {
            opacity: 1;
        }

        body.loaded .container {
            animation: floatLogo 6s ease-in-out infinite;
            transform: translateY(0) scale(1);
        }

        body.loaded .logo-text {
            animation: gradientShift 8s ease infinite;
        }

        body.loaded .orb.one {
            animation: shimmer 10s linear infinite alternate-reverse;
        }

        body.loaded .orb.two {
            animation: shimmer2 10s linear infinite alternate-reverse;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes shimmer {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-150px, -150px);
            }
        }

        @keyframes shimmer2 {
            from {
                transform: translate(100px, 100px);
            }

            to {
                transform: translate(200px, 200px);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @media (max-width: 767px) and (orientation: landscape) {
            :root {
                --card-padding: 0.75rem 1.25rem;
                --logo-size: clamp(58px, 16vh, 90px);
                --logo-gap: 0.25rem;
                --brand-gap: 0.25rem;
                --headline-gap: 0.5rem;
                --headline-width: 22ch;
                --headline-leading: 1.05;
            }

            body {
                align-items: stretch;
                padding: 0.5rem;
            }

            .container {
                max-width: min(92vw, 640px);
                min-height: 0;
                max-height: calc(100dvh - 1rem);
                gap: 0.35rem;
            }

            .logo-text {
                font-size: clamp(1.2rem, 5vw, 1.95rem);
            }

            h1 {
                font-size: clamp(0.88rem, 3vw, 1.1rem);
            }

            .badge {
                padding: 0.35rem 0.95rem;
                font-size: 0.68rem;
                line-height: 1;
            }

            .orb.one {
                width: 200px;
                height: 200px;
            }

            .orb.two {
                width: 280px;
                height: 280px;
            }
        }

        @media (max-width: 767px) and (max-height: 430px) and (orientation: landscape) {
            :root {
                --card-radius: 18px;
                --card-padding: 0.65rem 1rem;
                --logo-size: clamp(48px, 14vh, 72px);
                --headline-gap: 0.4rem;
                --headline-width: 20ch;
            }

            .logo-text {
                font-size: clamp(1rem, 4.8vw, 1.6rem);
            }

            h1 {
                font-size: clamp(0.78rem, 2.8vw, 0.98rem);
            }

            .badge {
                padding: 0.3rem 0.8rem;
                font-size: 0.62rem;
                letter-spacing: 1.2px;
            }
        }
    </style>
</head>

<body>
    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>

    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img" width="160" height="160">

        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge">COMING SOON</div>
    </div>

    <script>
        /* ===== START ANIMATIONS AFTER STABLE PAINT ===== */
        window.addEventListener('load', () =>
        {
            requestAnimationFrame(() =>
            {
                requestAnimationFrame(() =>
                {
                    document.body.classList.add('loaded');
                });
            });
        });

        /* ===== MOUSE PARALLAX (NO LAYOUT SHIFT) ===== */
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        document.addEventListener('mousemove', (e) =>
        {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            orb1.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
            orb2.style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>
</body>

</html>
