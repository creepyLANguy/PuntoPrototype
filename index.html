<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Padel Push</title>
    <meta name="description"
        content="Padel Push — The ultimate padel scoring system. Track scores, sets, and matches in real-time. Coming soon.">
    <link rel="icon" type="image/svg+xml" href="app/media/img/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #c8ff00;
            --accent-glow: rgba(200, 255, 0, 0.4);
            --accent-dim: rgba(200, 255, 0, 0.15);
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #080c17;
            --bg-surface: #0e1425;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.9);
            --glass-bg: rgba(0, 0, 0, 0.5);
            --glass-border: rgba(255, 255, 255, 0.2);
            --card-radius: 32px;
            --card-padding: clamp(2.5rem, 6vw, 4rem);
            --logo-size: clamp(120px, 15vw, 160px);
            --logo-gap: 2rem;
            --brand-gap: 0.75rem;
            --headline-gap: 2rem;
            --headline-width: 38ch;
            --headline-leading: 1.3;
            --container-scale: 1;
            --float-distance: 12px;
            --viewport-padding: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #11182c 0%, var(--bg-dark) 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: var(--viewport-padding);
            perspective: 1000px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.loaded {
            opacity: 1;
        }

        /* ─── Gradient orbs ─── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            transition: opacity 1.5s ease;
            will-change: transform;
            pointer-events: none;
            z-index: 0;
        }

        body.loaded .orb {
            opacity: 0.45;
        }

        .orb.one {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            top: -20%;
            left: -10%;
        }

        .orb.two {
            width: 65vw;
            height: 65vw;
            background: radial-gradient(circle, var(--secondary), transparent 70%);
            bottom: -25%;
            right: -10%;
        }

        .orb.three {
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        body.loaded .orb.three {
            opacity: 0.2;
        }

        /* ─── Particle canvas ─── */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ─── Card container ─── */
        .container-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: var(--card-padding);
            position: relative;

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(32px) saturate(1.8);
            -webkit-backdrop-filter: blur(32px) saturate(1.8);
            border-radius: var(--card-radius);

            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(124, 92, 255, 0.25),
                0 0 40px rgba(200, 255, 0, 0.05);
        }

        /* Inner shine effect */
        .container-shine {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(255, 255, 255, 0.08) 0%,
                    transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        /* ─── Badge ─── */
        .badge-wrapper {
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transition-delay: 0.2s;
        }

        body.loaded .badge-wrapper {
            opacity: 1;
            transform: translateY(0);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.4rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 100px;
            color: var(--accent);
            background: rgba(200, 255, 0, 0.1);
            border: 1px solid var(--accent-dim);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .badge::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent,
                    rgba(200, 255, 0, 0.1),
                    transparent);
            transform: rotate(45deg);
            animation: badgeShine 3s infinite;
        }

        @keyframes badgeShine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        /* ─── Logo ─── */
        .logo-wrapper {
            position: relative;
            width: var(--logo-size);
            height: var(--logo-size);
            margin-bottom: var(--logo-gap);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px var(--accent-glow));
            opacity: 0;
            transform: scale(0.8) translateZ(30px);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
            transition-delay: 0.4s;
        }

        body.loaded .logo-img {
            opacity: 1;
            transform: scale(1) translateZ(30px);
        }

        /* ─── Brand text ─── */
        .logo-text {
            font-size: clamp(2.8rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: var(--brand-gap);
            text-transform: uppercase;
            letter-spacing: -0.01em;
            line-height: 1;

            background: linear-gradient(to bottom, #fff 40%, rgba(255, 255, 255, 0.85) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            opacity: 0;
            transform: translateY(20px) translateZ(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transition-delay: 0.5s;
        }

        body.loaded .logo-text {
            opacity: 1;
            transform: translateY(0) translateZ(20px);
        }

        /* ─── Heading ─── */
        h1 {
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: 500;
            margin-bottom: var(--headline-gap);
            color: var(--text-muted);
            max-width: var(--headline-width);
            line-height: var(--headline-leading);
            text-wrap: balance;
            letter-spacing: 0.03em;

            opacity: 0;
            transform: translateY(20px) translateZ(10px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transition-delay: 0.6s;
        }

        body.loaded h1 {
            opacity: 1;
            transform: translateY(0) translateZ(10px);
        }

        /* ─── Info Section ─── */
        .info-section {
            width: 100%;
            padding-top: 2.5rem;
            margin-top: 1rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
            transition-delay: 0.7s;
        }

        body.loaded .info-section {
            opacity: 1;
            transform: translateY(0);
        }

        .platform-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .platform-logos {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .platform-icon {
            height: clamp(20px, 4vw, 24px);
            width: auto;
            opacity: 0.85;
            filter: brightness(0) invert(1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .platform-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ─── Hardware ─── */
        .hardware-announce {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 2.5rem;
            width: 100%;
        }

        .hw-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.9;
            text-wrap: balance;
            margin-bottom: 5%;
        }

        .hw-list {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: nowrap;
            width: 100%;
        }

        .hw-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            flex: 1 1 0;
            min-width: 0;
        }

        .hw-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
        }

        .hw-status {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .hw-icon {
            height: clamp(26px, 5vw, 40px);
            width: auto;
            margin-top: 0.25rem;
            opacity: 0.9;
            filter: brightness(0) invert(1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* ─── Animation helpers ─── */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(calc(-1 * var(--float-distance)));
            }
        }

        /* ─── Mobile Optimizations ─── */
        @media (max-width: 480px) {
            :root {
                --card-padding: 2rem 1.5rem;
                --logo-gap: 1.5rem;
                --headline-gap: 1.5rem;
            }

            .hw-list {
                gap: 0.5rem;
            }

            .hw-name {
                font-size: 0.95rem;
            }

            .platform-logos {
                gap: 1.5rem;
            }
        }

        /* Landscape fix for small screens */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 1rem;
                overflow-y: auto;
                align-items: flex-start;
            }

            .container-wrapper {
                margin: 2rem 0;
            }

            :root {
                --logo-size: 80px;
                --card-padding: 1.5rem;
            }

            .badge-wrapper {
                margin-bottom: 1rem;
            }

            .info-section {
                padding-top: 1.5rem;
                gap: 1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="particles" aria-hidden="true"></canvas>

    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>

    <div class="container-wrapper">
        <div class="container" id="mainCard">
            <div class="badge-wrapper">
                <div class="badge">
                    <span class="dot"></span>
                    Coming Soon
                </div>
            </div>

            <div class="logo-wrapper">
                <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img">
            </div>

            <div class="logo-text">Padel Push</div>
            <h1>Simpler, Smarter Scoring</h1>

            <div class="info-section">
                <div class="platform-container">
                    <div class="platform-logos">
                        <img src="media/logos/apple.svg" alt="iOS" class="platform-icon">
                        <img src="media/logos/android.svg" alt="Android" class="platform-icon">
                        <img src="media/logos/web.svg" alt="Web" class="platform-icon">
                    </div>
                    <div class="platform-text">iOS • Android • Web</div>
                </div>

                <div class="hardware-announce">
                    <div class="hw-label">Next-Gen Hardware in Development</div>
                    <div class="hw-list">
                        <div class="hw-item">
                            <span class="hw-name">Pulse Mini</span>
                            <span class="hw-status">Ultra Portable</span>
                        </div>
                        <div class="hw-item">
                            <span class="hw-name">Beacon Basic</span>
                            <span class="hw-status">Core Series</span>
                        </div>
                        <div class="hw-item">
                            <span class="hw-name">Beacon Pro</span>
                            <span class="hw-status">Flagship</span>
                        </div>
                    </div>
                    <div class="hw-list">
                        <div class="hw-item">
                            <img src="media/logos/d1.svg" alt="Pulse Mini" class="hw-icon">
                        </div>
                        <div class="hw-item">
                            <img src="media/logos/d2.svg" alt="Beacon Basic" class="hw-icon">
                        </div>
                        <div class="hw-item">
                            <img src="media/logos/d3.svg" alt="Beacon Pro" class="hw-icon">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('mainCard');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        // Particle System
        let particles = [];
        function resize()
        {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles()
        {
            particles = [];
            const count = Math.min(window.innerWidth / 10, 100);
            for (let i = 0; i < count; i++)
            {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    o: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate()
        {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p =>
            {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.fillStyle = `rgba(200, 255, 0, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        // Reveal effect
        function revealPage()
        {
            document.body.classList.add('loaded');
        }

        if (document.readyState === 'loading')
        {
            document.addEventListener('DOMContentLoaded', () => setTimeout(revealPage, 100));
        } else
        {
            setTimeout(revealPage, 100);
        }
    </script>
</body>

</html>
