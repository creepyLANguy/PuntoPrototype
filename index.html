<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Padel Push</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #05070d;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        html,
        body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            padding: 1.25rem;
            /* safe edges */

            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 92, 255, 0.08), transparent 40%),
                var(--bg-dark);
        }

        /* Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            transition: transform 0.2s ease-out;
        }

        .orb.one {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
            animation: shimmer 10s linear infinite alternate-reverse;
        }

        .orb.two {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
            animation: shimmer2 10s linear infinite alternate-reverse;
        }

        /* Particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;

            background-image:
                radial-gradient(10px 10px at 10% 20%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(2.5px 2.5px at 30% 70%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(4px 4px at 70% 40%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(7px 7px at 80% 10%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(12px 12px at 50% 50%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(25px 25px at 90% 80%, rgba(255, 255, 255, 0.25), transparent);

            background-size: 300px 300px;
            animation: shimmer 20s ease-in-out infinite alternate-reverse;
            opacity: 0.1;
        }

        .particles-back {
            background-image:
                radial-gradient(10px 10px at 50% 60%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(2.5px 2.5px at 30% 70%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(4px 4px at 10% 90%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(7px 7px at 40% 60%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(12px 12px at 10% 50%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(25px 25px at 10% 40%, rgba(255, 255, 255, 0.25), transparent);

            opacity: 0.1;
            animation: shimmer2 200s linear infinite alternate-reverse;
            transform: scale(7);
        }

        @keyframes shimmer {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-150px, -150px);
            }
        }

        @keyframes shimmer2 {
            from {
                transform: translate(100px, 100px) rotate(0deg);
            }

            to {
                transform: translate(200px, 200px) rotate(720deg);
            }
        }

        /* Glass card */
        .container {
            text-align: center;
            z-index: 3;
            max-width: 520px;
            max-height: calc(100dvh - 2.5rem);
            width: 100%;
            padding: clamp(1.5rem, 4vw, 3rem);

            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;

            box-shadow:
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 80px rgba(124, 92, 255, 0.2);

            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow:
                0 0 60px rgba(0, 212, 255, 0.2),
                0 0 120px rgba(124, 92, 255, 0.35);
        }

        .logo-img {
            width: clamp(100px, 30vw, 160px);
            margin-bottom: 1.5rem;
            animation: floatLogo 6s ease-in-out infinite;
        }

        @keyframes floatLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .logo-text {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -1px;

            background: linear-gradient(270deg, var(--primary), var(--secondary), var(--primary));
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            font-size: clamp(1rem, 3.5vw, 1.8rem);
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.85);
            text-wrap: balance;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 600;
            letter-spacing: 1.5px;

            color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .noise {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.035;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* Landscape optimization */
        /* Landscape optimization */
        @media (orientation: landscape) and (max-height: 700px) {
            body {
                padding: 2rem;
            }

            @media (orientation: landscape) {
                .container {
                    flex-direction: column;
                    /* keep stacking */
                    text-align: center;
                    max-width: 520px;
                    max-height: 90dvh;
                    /* leave some breathing room */
                    width: 100%;
                    padding: 1rem 1.5rem;
                    /* reduce padding slightly */
                }
            }

            @media (orientation: landscape) and (max-height: 500px) {
                .logo-img {
                    width: clamp(80px, 25vw, 120px);
                }

                .logo-text {
                    font-size: clamp(1.5rem, 5vw, 2.5rem);
                }

                h1 {
                    font-size: clamp(0.9rem, 3vw, 1.2rem);
                }

                .badge {
                    font-size: clamp(0.6rem, 2vw, 0.8rem);
                }
            }
        }
    </style>
</head>

<body>
    <div class="noise"></div>
    <div class="particles"></div>
    <div class="particles particles-back"></div>

    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>

    <div class="container">
        <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img">
        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge">Currently In Development</div>
    </div>

    <script>
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        document.addEventListener('mousemove', (e) =>
        {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            orb1.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
            orb2.style.transform = `translate(${x * -60}px, ${y * -60}px)`;
        });
    </script>
</body>

</html>
