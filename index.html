<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Padel Push</title>
    <meta name="description"
        content="Padel Push — The ultimate padel scoring system. Track scores, sets, and matches in real-time. Coming soon.">
    <link rel="icon" type="image/svg+xml" href="app/media/img/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #c8ff00;
            --accent-dim: rgba(200, 255, 0, 0.35);
            --primary: #00d4ff;
            --secondary: #7c5cff;
            --bg-dark: #04060c;
            --bg-surface: #0a0e1a;
            --text: #f0f2f8;
            --text-muted: rgba(240, 242, 248, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-radius: 24px;
            --card-padding: clamp(2rem, 5vw, 3.5rem);
            --logo-size: 150px;
            --logo-gap: 1.8rem;
            --brand-gap: 0.6rem;
            --headline-gap: 1.6rem;
            --headline-width: 22ch;
            --headline-leading: 1.25;
            --container-scale: 1;
            --float-distance: 10px;
            --viewport-padding: 1.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            min-height: 100dvh;
            padding:
                max(var(--viewport-padding), env(safe-area-inset-top)) max(var(--viewport-padding), env(safe-area-inset-right)) max(var(--viewport-padding), env(safe-area-inset-bottom)) max(var(--viewport-padding), env(safe-area-inset-left));
            background: var(--bg-dark);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* ─── Animated grid overlay ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(200, 255, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 255, 0, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Gradient orbs ─── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0;
            transition: opacity 1.2s ease;
            will-change: transform;
        }

        body.loaded .orb {
            opacity: 1;
        }

        .orb.one {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            top: 8%;
            left: 8%;
            opacity: 0.18;
        }

        .orb.two {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary), transparent 70%);
            bottom: 5%;
            right: 5%;
            opacity: 0.15;
        }

        .orb.three {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            opacity: 0.06;
        }

        body.loaded .orb.one {
            opacity: 0.18;
            animation: orbDrift1 14s ease-in-out infinite alternate;
        }

        body.loaded .orb.two {
            opacity: 0.15;
            animation: orbDrift2 16s ease-in-out infinite alternate;
        }

        body.loaded .orb.three {
            opacity: 0.06;
            animation: orbDrift3 12s ease-in-out infinite alternate;
        }

        /* ─── Particle canvas ─── */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ─── Card container ─── */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 3;
            max-width: 520px;
            width: 100%;
            padding: var(--card-padding);
            position: relative;

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border-radius: var(--card-radius);

            box-shadow:
                0 0 0 1px rgba(200, 255, 0, 0.04),
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(124, 92, 255, 0.08),
                0 0 120px rgba(0, 212, 255, 0.06);

            transform: translateY(20px) scale(calc(var(--container-scale) * 0.97));
            transform-origin: center center;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Subtle accent glow line at top of card */
        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
            border-radius: 999px;
        }

        /* ─── Logo ─── */
        .logo-wrapper {
            position: relative;
            width: var(--logo-size);
            height: var(--logo-size);
            margin-bottom: var(--logo-gap);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pulsing glow ring */
        .logo-wrapper::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-dim), transparent 70%);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        body.loaded .logo-wrapper::before {
            animation: logoPulse 4s ease-in-out infinite;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(200, 255, 0, 0.15));
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.loaded .logo-img {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.15s;
        }

        /* ─── Brand text ─── */
        .logo-text {
            font-size: clamp(2.2rem, 6.5vw, 3.5rem);
            font-weight: 900;
            margin-bottom: var(--brand-gap);
            text-transform: uppercase;
            letter-spacing: 0.04em;

            background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent) 100%);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.loaded .logo-text {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.3s;
            animation: gradientShift 6s ease infinite;
            animation-delay: 0.3s;
        }

        /* ─── Heading ─── */
        h1 {
            font-size: clamp(1rem, 3.2vw, 1.5rem);
            font-weight: 300;
            margin-bottom: var(--headline-gap);
            color: var(--text-muted);
            max-width: var(--headline-width);
            line-height: var(--headline-leading);
            text-wrap: balance;
            letter-spacing: 0.01em;

            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.loaded h1 {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.45s;
        }

        /* ─── Badge ─── */
        .badge {
            display: inline-block;
            padding: 0.55rem 1.6rem;
            font-size: clamp(0.65rem, 2.2vw, 0.8rem);
            font-weight: 700;
            letter-spacing: 2.5px;
            border-radius: 100px;
            color: var(--bg-dark);
            background: var(--accent);
            border: none;
            box-shadow: 0 0 20px rgba(200, 255, 0, 0.25), 0 0 60px rgba(200, 255, 0, 0.1);

            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.loaded .badge {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.6s;
        }

        .badge:hover {
            box-shadow: 0 0 30px rgba(200, 255, 0, 0.4), 0 0 80px rgba(200, 255, 0, 0.15);
        }

        /* ─── Loaded state — float ─── */
        body.loaded {
            opacity: 1;
        }

        body.loaded .container {
            animation: floatCard 7s ease-in-out infinite;
            animation-delay: 0.8s;
            transform: translateY(0) scale(var(--container-scale));
        }

        /* ─── Keyframes ─── */
        @keyframes floatCard {

            0%,
            100% {
                transform: translateY(0) scale(var(--container-scale));
            }

            50% {
                transform: translateY(calc(-1 * var(--float-distance))) scale(var(--container-scale));
            }
        }

        @keyframes orbDrift1 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(-80px, 60px) scale(1.15);
            }
        }

        @keyframes orbDrift2 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(100px, -80px) scale(0.9);
            }
        }

        @keyframes orbDrift3 {
            from {
                transform: translate(-50%, -50%) scale(1);
            }

            to {
                transform: translate(calc(-50% + 60px), calc(-50% - 40px)) scale(1.2);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes logoPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.08);
            }
        }

        /* ─── Landscape mobile ─── */
        @media (orientation: landscape) and (max-height: 500px) {
            :root {
                --viewport-padding: 0.85rem;
                --card-padding: clamp(0.9rem, 2.6vw, 1.35rem);
                --logo-size: clamp(64px, 12vw, 96px);
                --logo-gap: 0.5rem;
                --brand-gap: 0.3rem;
                --headline-gap: 0.6rem;
                --headline-width: 28ch;
                --headline-leading: 1.1;
                --float-distance: 5px;
            }

            .container {
                max-width: min(100%, 34rem);
            }

            .logo-text {
                font-size: clamp(1.5rem, 4vw, 2.2rem);
            }

            h1 {
                font-size: clamp(0.85rem, 2.3vw, 1.1rem);
            }

            .badge {
                padding: 0.4rem 1rem;
                font-size: clamp(0.6rem, 1.8vw, 0.72rem);
            }

            .logo-wrapper::before {
                inset: -6px;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01s !important;
                transition-duration: 0.01s !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="particles" aria-hidden="true"></canvas>

    <div class="orb one" id="orb1"></div>
    <div class="orb two" id="orb2"></div>
    <div class="orb three" id="orb3"></div>

    <div class="container" id="mainCard">
        <div class="logo-wrapper">
            <img src="app/media/img/logo.svg" alt="Padel Push Logo" class="logo-img" width="150" height="150">
        </div>

        <div class="logo-text">Padel Push</div>
        <h1>The Ultimate Padel Scoring System</h1>
        <div class="badge" id="badge">COMING SOON</div>
    </div>

    <script>
        /* ─── References ─── */
        const body = document.body;
        const container = document.getElementById('mainCard');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');
        const mobileLandscapeQuery = window.matchMedia('(orientation: landscape) and (max-height: 500px)');

        /* ─── Particle system ─── */
        let particles = [];
        const PARTICLE_COUNT = 150;

        function resizeCanvas()
        {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles()
        {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++)
            {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.3,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.4 + 0.05,
                    pulse: Math.random() * Math.PI * 2,
                });
            }
        }

        function drawParticles()
        {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles)
            {
                p.x += p.speedX;
                p.y += p.speedY;
                p.pulse += 0.015;

                // Wrap around
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                const flicker = 0.5 + 0.5 * Math.sin(p.pulse);
                ctx.globalAlpha = p.opacity * flicker;
                ctx.fillStyle = '#c8ff00';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(drawParticles);
        }

        resizeCanvas();
        createParticles();
        drawParticles();
        window.addEventListener('resize', () =>
        {
            resizeCanvas();
            createParticles();
        });

        /* ─── Landscape scale helper ─── */
        function getSpacingValue(styles, propertyName)
        {
            return parseFloat(styles.getPropertyValue(propertyName)) || 0;
        }

        function updateLandscapeScale()
        {
            container.style.setProperty('--container-scale', '1');

            if (!mobileLandscapeQuery.matches)
            {
                return;
            }

            const bodyStyles = window.getComputedStyle(document.body);
            const rootStyles = window.getComputedStyle(document.documentElement);
            const availableWidth = window.innerWidth
                - getSpacingValue(bodyStyles, 'padding-left')
                - getSpacingValue(bodyStyles, 'padding-right');
            const availableHeight = window.innerHeight
                - getSpacingValue(bodyStyles, 'padding-top')
                - getSpacingValue(bodyStyles, 'padding-bottom')
                - getSpacingValue(rootStyles, '--float-distance');

            const rect = container.getBoundingClientRect();
            const scale = Math.min(1, availableWidth / rect.width, availableHeight / rect.height);

            container.style.setProperty('--container-scale', scale.toFixed(4));
        }

        /* ─── Orb parallax on mouse ─── */
        function updateOrbParallax(e)
        {
            const x = (e.clientX / window.innerWidth - 0.5);
            const y = (e.clientY / window.innerHeight - 0.5);

            orb1.style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            orb2.style.transform = `translate(${x * -70}px, ${y * -70}px)`;
        }

        /* ─── Init ─── */
        function startAnimations()
        {
            body.classList.add('loaded');
            updateLandscapeScale();
        }

        window.addEventListener('load', () =>
        {
            requestAnimationFrame(() =>
            {
                requestAnimationFrame(startAnimations);
            });
        });

        document.addEventListener('mousemove', updateOrbParallax);
        window.addEventListener('resize', updateLandscapeScale);
        window.addEventListener('orientationchange', updateLandscapeScale);
        mobileLandscapeQuery.addEventListener('change', updateLandscapeScale);

        if (document.fonts?.ready)
        {
            document.fonts.ready.then(updateLandscapeScale);
        }

        updateLandscapeScale();
    </script>
</body>

</html>
