<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Tool | Padel Push</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>
    <div class="studio-shell">
        <header class="mobile-top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="mobile-brand">
                <img src="favicon.svg" class="logo-img-small" alt="Logo">
                <span>NFC Tool</span>
            </div>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </header>

        <aside class="studio-sidebar" id="sidebar">
            <button class="menu-close" onclick="toggleSidebar()">✕</button>
            <div class="brand">
                <img src="favicon.svg" class="logo-img" alt="Padel Push Logo">
                <div class="brand-meta">
                    <h1>NFC Tool</h1>
                    <span class="version">by Padel Push</span>
                </div>
            </div>

            <div class="nav-cluster">
                <div class="nav-section">
                    <p class="label">Main System</p>
                    <button class="nav-pill back-btn" onclick="window.close()">← Back to Admin</button>
                </div>

                <div class="nav-section">
                    <p class="label">System Mode</p>
                    <div class="mode-segment">
                        <button class="seg-btn active" onclick="setMode('write', this)">Write</button>
                        <button class="seg-btn" onclick="setMode('write_missing', this)">Missing</button>
                        <button class="seg-btn" onclick="setMode('verify', this)">Verify</button>
                        <button class="seg-btn" onclick="setMode('locate', this)">Locate</button>
                    </div>
                    <button class="nav-pill" onclick="exportCSV()">Export Log</button>
                </div>

                <div class="nav-section">
                    <p class="label">Data Management</p>
                    <label class="nav-pill load-list-btn">
                        Load List
                        <input type="file" id="file" accept=".csv,.txt" hidden />
                    </label>
                    <button class="nav-pill danger" onclick="clearData()">Clear All</button>
                </div>
            </div>

            <button class="theme-toggle" onclick="toggleDark()">🌓 Theme</button>
        </aside>

        <main class="studio-stage">
            <header class="telemetry-bar">
                <div class="engine-status">
                    <div class="indicator" id="pulseIndicator"></div>
                    <h2 id="status">System Ready</h2>
                </div>

                <div class="progress-box">
                    <div class="progress-text">
                        <span id="counter">0 / 0</span>
                        <span id="percentLabel">0%</span>
                    </div>
                    <div class="progress-rail">
                        <div id="progressFill" class="progress-thumb"></div>
                    </div>
                </div>
            </header>

            <section class="control-matrix">
                <div class="action-row">
                    <button class="btn-action primary" id="startBtn" onclick="start()">START SCANNING</button>
                    <button class="btn-action abort" onclick="stop()">STOP</button>
                </div>
                <div class="action-row">
                    <button class="btn-action secondary" onclick="prev()">BACK</button>
                    <button class="btn-action secondary" onclick="next()">SKIP</button>
                    <button class="btn-action secondary" onclick="resetProgress()">RESET</button>
                </div>
            </section>

            <section class="ledger-container">
                <div class="ledger-header">
                    <h3>Batch Ledger</h3>
                </div>
                <div id="list" class="ledger-list"></div>
            </section>
        </main>
    </div>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <script src="./script.js"></script>

</body>

</html>
