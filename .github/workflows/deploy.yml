name: Deploy to Firebase Hosting on push
on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "style.css"
      - "app/**"
      - "nfc/**"
      - "media/**"
      - "firebase.json"
      - ".firebaserc"
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create firebase-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JS_CONTENT }}
        run: |
          echo "$FIREBASE_CONFIG" > app/js/firebase-config.js

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g firebase-tools@latest
      - run: firebase --version

      - name: Deploy Hosting
        run: |
          set +e
          output=$(firebase deploy --only hosting --project punto-8888 --token "${{ secrets.FIREBASE_TOKEN }}" 2>&1)
          exit_code=$?

          echo "$output"

          if [ $exit_code -eq 0 ]; then
            echo "Deployment successful"
            exit 0
          fi

          if echo "$output" | grep -q "current active version"; then
            echo "Already deployed - no changes to hosting"
            exit 0
          fi

          echo "Deployment failed"
          exit $exit_code