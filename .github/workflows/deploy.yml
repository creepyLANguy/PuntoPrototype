name: Deploy to Firebase Hosting on push
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create firebase-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JS_CONTENT }}
        run: |
          echo "$FIREBASE_CONFIG" > app/js/firebase-config.js

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project punto-8888 --token "${{ secrets.FIREBASE_TOKEN }}"
