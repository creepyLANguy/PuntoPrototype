name: Firebase Hosting Deploy

on:
  push:
    paths:
      - "index.html"
      - "style.css"
      - "app/**"
      - "nfc/**"
      - "media/**"
      - "firebase.json"
      - ".firebaserc"

permissions:
  contents: read

concurrency:
  group: hosting-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create firebase-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JS_CONTENT_PRODUCTION }}
        run: |
          echo "$FIREBASE_CONFIG" > app/js/firebase-config.js

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g firebase-tools@latest
      - run: firebase --version

      - name: Deploy production hosting
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_PRODUCTION }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_PRODUCTION }}
        run: |
          set +e
          output=$(firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" 2>&1)
          exit_code=$?

          echo "$output"

          if [ $exit_code -eq 0 ]; then
            echo "Deployment successful"
            exit 0
          fi

          if echo "$output" | grep -q "current active version"; then
            echo "Already deployed - no changes to hosting"
            exit 0
          fi

          echo "Deployment failed"
          exit $exit_code

  deploy_staging:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create firebase-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JS_CONTENT_STAGING }}
        run: |
          echo "$FIREBASE_CONFIG" > app/js/firebase-config.js

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g firebase-tools@latest
      - run: firebase --version

      - name: Deploy staging hosting
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_STAGING }}
        run: |
          set +e
          output=$(firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" 2>&1)
          exit_code=$?

          echo "$output"

          if [ $exit_code -eq 0 ]; then
            echo "Deployment successful"
            exit 0
          fi

          if echo "$output" | grep -q "current active version"; then
            echo "Already deployed - no changes to hosting"
            exit 0
          fi

          echo "Deployment failed"
          exit $exit_code