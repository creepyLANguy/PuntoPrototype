name: Firebase Functions Deploy (Optimized)

# Trigger on push to any branch, but only if files inside functions/ change
on:
  push:
    branches:
      - '**'
    paths:
      - 'functions/**'   # Only triggers if files inside functions/ change

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Cache node_modules to speed up builds
      - name: Cache functions dependencies
        uses: actions/cache@v3
        with:
          path: functions/node_modules
          key: ${{ runner.os }}-functions-${{ hashFiles('functions/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-functions-

      # 4️⃣ Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 5️⃣ Install project dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: ./functions

      # 6️⃣ Deploy Firebase Functions
      - name: Deploy Firebase Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions --token "$FIREBASE_TOKEN"